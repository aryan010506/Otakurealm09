<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Manga Edition — Otaku Realm</title>
    <meta name="description" content="Get in touch with the Otaku Realm team. Feedbacks, suggestions, and business inquiries welcome.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://otakurealm09.netlify.app/pages/contact.html">
    <meta property="og:title" content="Contact Us — Otaku Realm">
    <meta property="og:description" content="Get in touch with the Otaku Realm team.">
    <meta property="og:image" content="https://otakurealm09.netlify.app/hero.png">

    <!-- Google Analytics 4 -->

      function gtag(){dataLayer.push(arguments);}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=4.1">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script>
        if (localStorage.getItem('manga-theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <style>
        body {
            background-color: #f0f0f0;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .manga-header {
            background: var(--black);
            color: var(--white);
            padding: 2rem;
            transform: skewY(-2deg);
            margin-top: -1rem;
            margin-bottom: 4rem;
            border-bottom: 8px solid var(--white);
            outline: 4px solid var(--black);
        }
        .contact-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        .manga-panel-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .manga-panel-grid { 
                grid-template-columns: 1fr; 
            }
            .panel {
                transform: none !important; /* Remove tilt on mobile for better alignment */
                box-shadow: 10px 10px 0 var(--black) !important;
            }
        }
        .panel {
            background: var(--white);
            border: 5px solid var(--black);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .panel-info {
            transform: rotate(-1deg);
            box-shadow: 15px 15px 0 rgba(0,0,0,0.1);
        }
        .panel-form {
            transform: rotate(1deg);
            box-shadow: -15px 15px 0 var(--black);
        }
        .halftone-bg {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-image: radial-gradient(var(--black) 1px, transparent 0);
            background-size: 4px 4px;
            opacity: 0.05;
            pointer-events: none;
        }
        .form-group {
            position: relative;
            z-index: 10;
            margin-bottom: 2rem;
        }
        .form-group label {
            display: block;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            border-left: 10px solid var(--black);
            padding-left: 1rem;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 1.2rem;
            border: 3px solid var(--black);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            background: white;
            color: black !important;
            position: relative;
            z-index: 11;
            transition: all 0.2s;
            outline: none;
            caret-color: var(--black); /* Ensures the marker/cursor is visible */
        }
        .form-input:focus {
            background: #fff;
            box-shadow: 8px 8px 0 var(--black);
            transform: translate(-4px, -4px);
            border-width: 4px;
        }
        .submit-btn {
            background: var(--black);
            color: var(--white);
            width: 100%;
            padding: 1.5rem;
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            position: relative;
            transition: 0.1s;
        }
        .submit-btn:hover {
            background: var(--gray-dark);
            transform: scale(1.02);
        }
        .kanji-float {
            position: absolute;
            font-size: 12rem;
            color: rgba(0,0,0,0.05);
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 900;
            line-height: 1;
            z-index: -1;
        }
    </style>
</head>
<body class="light-mode">
    <header class="manga-header">
        <div class="container">
            <a href="../index.html" style="text-decoration: none; color: inherit;">
                <h1 style="font-size: 4rem; letter-spacing: -2px;">OTAKU REALM // 通信</h1>
            </a>
        </div>
    </header>

    <main class="contact-container">
        <div class="manga-panel-grid">
            <!-- Left Panel: Info -->
            <div class="panel panel-info">
                <div class="halftone-bg"></div>
                <h2 style="font-size: 3rem; margin-bottom: 2rem; border-bottom: 4px solid var(--black);">CONTACT</h2>
                <p style="font-size: 1.2rem; line-height: 1.6; margin-bottom: 2rem;">
                    Got a series that needs a deep dive? 
                    Found a mistake in our data? 
                    Or just want to send some hype?
                </p>
                <div style="background: var(--black); color: var(--white); padding: 1rem; margin-bottom: 2rem;">
                    <p style="font-family: 'Roboto Mono', monospace;">STATUS: READY_TO_RECEIVE</p>
                </div>
                <div class="kanji-float" style="bottom: -20px; right: -20px;">信</div>
            </div>

            <!-- Right Panel: Form -->
            <div class="panel panel-form">
                <form name="contact" method="POST" data-netlify="true">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" class="form-input" required placeholder="USER_ID">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" class="form-input" required placeholder="CONTACT_GATEWAY">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <select name="subject" class="form-input">
                            <option>Anime Request</option>
                            <option>Feedback</option>
                            <option>Correction</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea name="message" class="form-input" rows="6" required placeholder="TRANSMISSION_CONTENT"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">SEND TRANSMISSION</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="manga-footer" style="margin-top: 6rem;">
        <div class="container">
            <p>© 2026 OTAKU REALM. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>
</body>
</html>
