<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Anime by Genre — Manga Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=4.0">
    <script>
        if (localStorage.getItem('manga-theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <style>
        .anime-card {
            border: 4px solid var(--black);
            background: var(--white);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 8px 8px 0px var(--black);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 480px; /* Uniform height */
            position: relative;
        }
        .anime-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--black);
        }
        .anime-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px dashed var(--black);
            padding-bottom: 1rem;
            min-height: 80px;
        }
        .anime-title {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .anime-jp {
            font-family: var(--font-jp);
            font-weight: 700;
            color: var(--gray-dark);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .anime-rating {
            background: var(--black);
            color: var(--white);
            font-weight: 900;
            padding: 0.2rem 0.5rem;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .anime-meta {
            display: flex;
            gap: 1rem;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 1rem;
        }
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
            max-height: 60px;
            overflow: hidden;
        }
        .tag {
            background: var(--gray-light);
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 800;
            border: 1px solid var(--black);
        }
        body.dark-mode .tag {
            background: var(--gray-dark);
            color: var(--white);
        }
        .anime-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--black);
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar" class="manga-nav">
        <div class="nav-inner">
            <a href="../index.html" class="logo">
                <span class="logo-text">OTAKU</span>
                <span class="logo-accent">REALM</span>
                <span class="logo-jp">オタク</span>
            </a>
            <button class="nav-hamburger" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="search-bar" id="search-bar">
                <input type="text" id="search-input" placeholder="Search Topics..." autocomplete="off">
                <div class="search-results" id="search-results"></div>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="nav-auth-btn"></li>
                <li><button id="theme-toggle" class="btn btn-manga-alt px-2" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">🌙 NIGHT MODE</button></li>
            </ul>
        </div>
    </nav>

    <!-- AdSense Below Navbar -->
    <div class="container center" style="margin: 1rem auto;">
        <div style="padding: 10px; border: 1px dashed var(--gray-light); font-size: 0.7rem; color: var(--gray-dark);">ADSENSE UNIT: BELOW NAVBAR</div>
    </div>

    <!-- Page Header -->
    <header class="hero manga-panel" style="min-height: 40vh;">
        <div class="hero-content" style="grid-template-columns: 1fr;">
            <div class="hero-text-wrap" style="text-align: center;">
                <p class="hero-tag" id="genre-tag">TOP 100 ANIME</p>
                <h1 class="hero-title" id="genre-title" style="font-size: 4rem; text-transform: uppercase;">
                    LOADING<br>
                    <span class="text-outline">DATABASE</span>
                </h1>
                <p class="hero-sub" style="margin-bottom: 0;">
                    The ultimate master list of the best anime in this genre.
                </p>
            </div>
        </div>
    </header>

    <!-- Content -->
    <section class="section bg-dots">
        <div class="container">
            <div id="results-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem;">
                <!-- Results loaded via JS -->
            </div>
            
            <!-- AdSense Bottom of Page -->
            <div class="container center" style="margin: 4rem auto 2rem auto;">
                <div style="padding: 20px; border: 1px dashed var(--gray-light); font-size: 0.7rem; color: var(--gray-dark);">ADSENSE UNIT: BOTTOM OF PAGE</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="manga-footer">
        <div class="container">
            <div class="footer-content">
                <div class="brand">
                    <h2>OTAKU REALM</h2>
                    <p>The ultimate manga-style anime blog. No fluff. Just raw data.</p>
                </div>
                <div class="footer-links">
                    <a href="../index.html">← BACK TO HOME</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 OTAKU REALM.</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="../auth.js"></script>
    <script src="../search.js?v=5.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const genreQuery = urlParams.get('type') || 'Action';
            
            // Jikan Genre Mapping
            const genreMap = {
                'Action': 1,
                'Romance': 22,
                'Thriller': 41,
                'Sci-Fi': 24,
                'Sports': 30,
                'Fantasy': 10,
                'Adventure': 2,
                'Comedy': 4,
                'Drama': 8,
                'Horror': 14,
                'Mystery': 7,
                'Psychological': 40
            };

            const genreId = genreMap[genreQuery] || 1;
            
            // Update Headers
            document.getElementById('genre-tag').textContent = `TOP 100 ${genreQuery.toUpperCase()}`;
            document.getElementById('genre-title').innerHTML = `BEST OF<br><span class="text-outline">${genreQuery.toUpperCase()}</span>`;

            const container = document.getElementById('results-container');
            container.innerHTML = ''; // Start empty for a cleaner look

            try {
                // Staggered Loading Strategy for speed
                // 1. Fetch first 25 immediately for instant display
                const res1 = await fetch(`https://api.jikan.moe/v4/anime?genres=${genreId}&order_by=score&sort=desc&sfw=true&page=1`);
                const data1 = await res1.json();
                
                if (data1.data) {
                    renderAnime(data1.data);
                }

                // 2. Fetch remaining pages in background
                const fetchRemaining = async () => {
                    for(let page=2; page<=4; page++) {
                        await new Promise(r => setTimeout(r, 400)); // Small gap to stay safe
                        const res = await fetch(`https://api.jikan.moe/v4/anime?genres=${genreId}&order_by=score&sort=desc&sfw=true&page=${page}`);
                        const data = await res.json();
                        if(data.data) renderAnime(data.data);
                    }
                };
                fetchRemaining();

                function renderAnime(list) {
                    list.forEach(anime => {
                        const score = anime.score ? `${anime.score.toFixed(1)}/10` : 'N/A';
                        const studio = anime.studios.length > 0 ? anime.studios[0].name : 'Unknown';
                        const genres = anime.genres.map(g => `<span class="tag" style="background: var(--black); color: var(--white);">${g.name.toUpperCase()}</span>`).join('');
                        const jpName = anime.title_japanese || '';
                        const synopsis = anime.synopsis || 'No description available.';

                        container.innerHTML += `
                            <a href="anime-detail.html?id=${anime.mal_id}&source=jikan" style="text-decoration: none; color: inherit;">
                                <div class="anime-card">
                                    <div class="anime-header">
                                        <div>
                                            <div class="anime-title">${anime.title}</div>
                                            <div class="anime-jp">${jpName}</div>
                                        </div>
                                        <div class="anime-rating">★ ${score}</div>
                                    </div>
                                    <div class="anime-meta">
                                        <span>${anime.year || 'N/A'}</span>
                                        <span>•</span>
                                        <span>${anime.episodes || '??'} EPS</span>
                                        <span>•</span>
                                        <span>${studio}</span>
                                    </div>
                                    <div class="tag-list">
                                        ${genres}
                                    </div>
                                    <p class="anime-desc">
                                        ${synopsis}
                                    </p>
                                </div>
                            </a>
                        `;
                    });
                }

                if (!data1.data || data1.data.length === 0) {
                    container.innerHTML = `
                        <div class="cat-panel" style="grid-column: 1 / -1; padding: 3rem; text-align: center;">
                            <h3 style="font-size: 2rem;">No Records Found</h3>
                            <p>We couldn't find any anime matching the genre "${genreQuery}".</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error("Failed to load database:", error);
                container.innerHTML = `
                    <div class="cat-panel" style="grid-column: 1 / -1; padding: 3rem; text-align: center;">
                        <h3 style="font-size: 2rem;">API Connection Error</h3>
                        <p>Could not connect to the live anime database. Please check your connection.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
